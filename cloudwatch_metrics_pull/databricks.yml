#      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
#    variables:
#      env: test
#      is_dev: true
#    resources:
#      pipelines:
#        cloudwatch_metrics_pull:
#          libraries: *test_libraries
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: lakehouse_prod
