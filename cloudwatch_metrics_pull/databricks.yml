# This is a Databricks asset bundle definition for cloudwatch_metrics_pull.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: cloudwatch_metrics_pull
include:
  - resources/*.yml
  - resources/*/*.yml
variables:
  catalog:
    description: The target Unity Catalog
    default: lakehouse_dev
  schema:
    description: The target Schema
    default: cloudwatch_metrics_pull
  env:
    description: "Environment identifier (dev/prod)"
  is_dev:
      description: "Boolean flag for development mode"
targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      env: dev
      is_dev: true
  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      env: prod
      is_dev: false
