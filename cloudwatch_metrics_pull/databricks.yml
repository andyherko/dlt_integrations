# This is a Databricks asset bundle definition for cloudwatch_metrics_pull.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: cloudwatch_metrics_pull
  uuid: eeca02ea-c5f7-4f80-b15d-50f67f1048c7

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-2e2e74a8-e436.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-2e2e74a8-e436.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/herkoa.valtech@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/herkoa.valtech@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: herkoa.valtech@gmail.com
        level: CAN_MANAGE
